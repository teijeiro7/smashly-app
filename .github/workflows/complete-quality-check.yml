name: Complete Quality Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  backend-complete:
    name: Backend Complete Tests
    runs-on: ubuntu-latest
    environment: SMASHLY

    defaults:
      run:
        working-directory: ./backend/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./backend/api/package-lock.json"

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./backend/api/coverage/
          retention-days: 30

  # ===========================
  # FRONTEND - Tests Completos
  # ===========================
  frontend-complete:
    name: Frontend Complete Tests
    runs-on: ubuntu-latest
    environment: SMASHLY

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run unit tests
        run: npm run test:unit

      - name: Check if integration tests exist
        id: check-integration-tests
        run: |
          if [ -d "src/__tests__/integration" ] && [ -n "$(find src/__tests__/integration -type f -name '*.test.*' 2>/dev/null)" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "Integration test files found."
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No integration test files found. Skipping integration tests."
          fi

      - name: Run integration tests
        if: steps.check-integration-tests.outputs.has_tests == 'true'
        run: npm run test:integration

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend/coverage/
          retention-days: 30

  # ===========================
  # TESTS E2E - PLAYWRIGHT
  # ===========================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-complete, frontend-complete]
    environment: SMASHLY

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            testing/package-lock.json

      # Instalar dependencias
      - name: Install backend dependencies
        working-directory: ./backend/api
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install testing dependencies
        working-directory: ./testing
        run: npm install

      - name: Install Playwright browsers
        working-directory: ./testing
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # Build de aplicaciones
      - name: Build backend
        working-directory: ./backend/api
        run: npm run build

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL: http://localhost:3000

      - name: Verify frontend build
        working-directory: ./frontend
        run: |
          echo "Verifying frontend build..."
          if [ -d "dist" ]; then
            echo "✅ dist directory exists"
            echo "Files in dist:"
            ls -la dist/
          else
            echo "❌ dist directory not found!"
            exit 1
          fi
          if [ -f "dist/index.html" ]; then
            echo "✅ index.html exists"
          else
            echo "❌ index.html not found!"
            exit 1
          fi

      # Iniciar aplicación en background
      - name: Start backend server
        working-directory: ./backend/api
        run: |
          mkdir -p logs
          npm start > logs/backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend started with PID: $(cat backend.pid)"
          echo "Waiting 5 seconds for backend to initialize..."
          sleep 5
          tail -n 20 logs/backend.log || echo "No logs yet"
        env:
          NODE_ENV: test
          PORT: 3000
          USE_HTTPS: "false"
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FRONTEND_URL: http://localhost:5173

      - name: Start frontend server
        working-directory: ./frontend
        run: |
          mkdir -p logs
          npm run preview -- --port 5173 --host 0.0.0.0 > logs/frontend.log 2>&1 &
          echo $! > frontend.pid
          echo "Frontend started with PID: $(cat frontend.pid)"
          echo "Waiting 5 seconds for frontend to initialize..."
          sleep 5
          tail -n 20 logs/frontend.log || echo "No logs yet"
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL: http://localhost:3000

      # Esperar que los servicios estén listos
      - name: Wait for backend
        run: |
          echo "Checking if backend process is running..."
          if [ -f "./backend/api/backend.pid" ]; then
            BACKEND_PID=$(cat ./backend/api/backend.pid)
            if ps -p $BACKEND_PID > /dev/null; then
              echo "✅ Backend process is running (PID: $BACKEND_PID)"
            else
              echo "❌ Backend process is not running!"
              echo "Backend logs:"
              cat ./backend/api/logs/backend.log || echo "No logs"
              exit 1
            fi
          else
            echo "❌ Backend PID file not found!"
            exit 1
          fi

          echo ""
          echo "Waiting for backend health check..."
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/v1/health > /dev/null 2>&1; then
              echo "✅ Backend health check passed!"
              echo "Health response:"
              curl -s http://localhost:3000/api/v1/health | head -c 300
              break
            fi
            echo "Attempt $i: Backend not ready yet, waiting 2s..."
            sleep 2
          done

          echo ""
          echo "Backend logs (last 15 lines):"
          tail -n 15 ./backend/api/logs/backend.log || echo "No backend logs"

      - name: Wait for frontend
        run: |
          echo "Checking if frontend process is running..."
          if [ -f "./frontend/frontend.pid" ]; then
            FRONTEND_PID=$(cat ./frontend/frontend.pid)
            if ps -p $FRONTEND_PID > /dev/null; then
              echo "✅ Frontend process is running (PID: $FRONTEND_PID)"
            else
              echo "❌ Frontend process is not running!"
              echo "Frontend logs:"
              cat ./frontend/logs/frontend.log || echo "No logs"
              exit 1
            fi
          else
            echo "❌ Frontend PID file not found!"
            exit 1
          fi

          echo ""
          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -f http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend is ready!"
              echo "Frontend response:"
              curl -s http://localhost:5173 | head -c 200
              break
            fi
            echo "Attempt $i: Frontend not ready yet, waiting 2s..."
            sleep 2
          done

          echo ""
          echo "Frontend logs (last 15 lines):"
          tail -n 15 ./frontend/logs/frontend.log || echo "No frontend logs"

      # Ejecutar tests E2E con Playwright
      - name: Run E2E tests (${{ matrix.browser }})
        working-directory: ./testing
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FRONTEND_URL: http://localhost:5173

      # Cleanup
      - name: Stop services
        if: always()
        run: |
          echo "Stopping services..."
          if [ -f "./backend/api/backend.pid" ]; then
            BACKEND_PID=$(cat ./backend/api/backend.pid)
            echo "Killing backend PID: $BACKEND_PID"
            kill $BACKEND_PID || true
            rm ./backend/api/backend.pid
          fi
          if [ -f "./frontend/frontend.pid" ]; then
            FRONTEND_PID=$(cat ./frontend/frontend.pid)
            echo "Killing frontend PID: $FRONTEND_PID"
            kill $FRONTEND_PID || true
            rm ./frontend/frontend.pid
          fi

          echo "Services stopped"

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs-${{ matrix.browser }}
          path: |
            ./backend/api/logs/
            ./frontend/logs/
          retention-days: 7

      - name: Upload E2E test results (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            ./testing/playwright-report/
            ./testing/test-results/
          retention-days: 30

      - name: E2E test summary (${{ matrix.browser }})
        if: always()
        run: |
          echo "=========================================="
          echo "E2E Test Summary - ${{ matrix.browser }}"
          echo "=========================================="
          if [ -f "./testing/playwright-report/index.html" ]; then
            echo "✅ Test report generated"
          else
            echo "❌ No test report found"
          fi
          if [ -d "./testing/test-results" ]; then
            echo "Test results files:"
            find ./testing/test-results -type f 2>/dev/null | head -10 || echo "No test result files"
          else
            echo "❌ No test results directory"
          fi
          echo "=========================================="

  # ===========================
  # SECURITY SCAN
  # ===========================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    environment: SMASHLY

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Audit backend dependencies
        working-directory: ./backend/api
        run: |
          npm install
          npm audit fix || true
          npm audit --audit-level=critical

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: |
          npm install
          npm audit fix || true
          npm audit --audit-level=critical

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: typescript, javascript

      - name: Build for CodeQL
        working-directory: ./backend/api
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ===========================
  # RESUMEN FINAL
  # ===========================
  complete-quality-summary:
    name: Complete Quality Summary
    runs-on: ubuntu-latest
    needs: [backend-complete, frontend-complete, e2e-tests, security-scan]
    if: always()

    steps:
      - name: All checks passed
        if: needs.backend-complete.result == 'success' && needs.frontend-complete.result == 'success' && needs.security-scan.result == 'success' && needs.e2e-tests.result == 'success'
        run: |
          echo "ALL QUALITY CHECKS PASSED!"
          echo "Backend tests (unit + integration): SUCCESS"
          echo "Frontend tests (unit + integration): SUCCESS"
          echo "E2E tests (Chrome + Firefox): SUCCESS"
          echo "Security scan: SUCCESS"
          echo ""
          echo "This code is ready to merge to main!"

      - name: Some checks failed
        if: needs.backend-complete.result == 'failure' || needs.frontend-complete.result == 'failure' || needs.e2e-tests.result == 'failure' || needs.security-scan.result == 'failure'
        run: |
          echo "QUALITY CHECKS FAILED!"
          echo "Backend tests: ${{ needs.backend-complete.result }}"
          echo "Frontend tests: ${{ needs.frontend-complete.result }}"
          echo "E2E tests: ${{ needs.e2e-tests.result }}"
          echo "Security scan: ${{ needs.security-scan.result }}"
          echo ""
          echo "This code cannot be merged to main until all checks pass."
          exit 1
