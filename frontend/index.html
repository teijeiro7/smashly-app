    />

    <meta property="og:type" content="website" />

    <div id="root"></div>

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {

          "@type": "WebSite",

          "name": "Smashly",
          "description": "Comparador de palas de pádel con inteligencia artificial",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://smashly-app.es/catalog?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://smashly-app.es/#organization",
          "name": "Smashly",
          "url": "https://smashly-app.es/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://smashly-app.es/images/icons/smashly-icon.png"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Smashly",
          "applicationCategory": "SportsApplication",
          "operatingSystem": "Web",
          "description": "Plataforma para comparar y analizar más de 800 palas de pádel con IA y precios actualizados en tiempo real.",
          "url": "https://smashly-app.es/",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR"
          }
        }
      ]
    }
