services:
  - type: web
    name: smashly-app
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    # Render inyecta $PORT automáticamente, el servidor lo recoge vía process.env.PORT
    envVars:
      # --- Runtime: comportamiento del servidor ---
      - key: NODE_ENV
        value: production
      - key: USE_HTTPS
        value: "false" # Render termina TLS en su edge; el contenedor usa HTTP
      - key: FRONTEND_URL
        value: https://smashly-app.es,https://www.smashly-app.es

      # --- Supabase ---
      - key: SUPABASE_URL
        sync: false # sync:false = Render te pedirá el valor en el dashboard (no se sube al repo)
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # --- Auth ---
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

      # --- IA ---
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FREE_AI_API_URL
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false

      # --- Variables de BUILD para Vite (Render las pasa como --build-arg al docker build) ---
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_API_URL
        sync: false

    # Plan gratuito
    plan: free
    region: frankfurt # O 'oregon' si prefieres US. Frankfurt suele ir mejor desde España.
